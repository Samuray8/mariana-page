<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>iPhone — mockup 3D</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #4b4d52; }
    #c { display: block; width: 100%; height: 100%; touch-action: none; cursor: grab; }
    #c:active { cursor: grabbing; }
    #hint {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      font: 12px system-ui, sans-serif;
      color: rgba(255, 255, 255, 0.35);
      pointer-events: none;
      text-align: center;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hint">Arrastra para rotar · rueda para zoom</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    const BG = 0x4b4d52;

    /** Titanio azul pizarra (trasera mate, foto referencia) */
    const COL_BACK = 0x565f72;
    const COL_METAL = 0x727d90;
    const COL_METAL_DIM = 0x5c6678;
    const COL_LOGO = 0x141820;
    /** Módulo de cámaras: isla ligeramente más oscura que la trasera */
    const COL_CAM_BUMP = 0x434d5f;
    const COL_LENS_GLASS = 0x06080c;

    const canvas = document.getElementById('c');
    const camera = new THREE.PerspectiveCamera(
      38,
      window.innerWidth / window.innerHeight,
      0.01,
      5000
    );

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.02;
    renderer.shadowMap.enabled = false;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(BG);

    const pmrem = new THREE.PMREMGenerator(renderer);
    const envScene = new RoomEnvironment();
    const envTexture = pmrem.fromScene(envScene, 0.04).texture;
    scene.environment = envTexture;
    pmrem.dispose();
    envScene.dispose();

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.minDistance = 0.08;
    controls.maxDistance = 50;

    function disposeMeshMaterials(mesh) {
      const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
      mats.forEach((m) => m?.dispose?.());
    }

    function stripLights(root) {
      const stack = [root];
      while (stack.length) {
        const o = stack.pop();
        if (o.isLight) {
          o.parent?.remove(o);
          o.dispose?.();
          continue;
        }
        if (o.children) stack.push(...o.children);
      }
    }

    function applyMockupMaterials(root, envMap) {
      const screen = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        roughness: 0.94,
        metalness: 0,
        envMap,
        envMapIntensity: 0.12
      });
      const bezel = new THREE.MeshStandardMaterial({
        color: 0x030305,
        roughness: 0.48,
        metalness: 0.42,
        envMap,
        envMapIntensity: 0.55
      });
      const backMatte = new THREE.MeshStandardMaterial({
        color: COL_BACK,
        roughness: 0.9,
        metalness: 0.08,
        envMap,
        envMapIntensity: 0.34
      });
      const metalEdge = new THREE.MeshStandardMaterial({
        color: COL_METAL,
        roughness: 0.32,
        metalness: 0.93,
        envMap,
        envMapIntensity: 1.08
      });
      const metalButton = new THREE.MeshStandardMaterial({
        color: COL_METAL_DIM,
        roughness: 0.36,
        metalness: 0.9,
        envMap,
        envMapIntensity: 0.95
      });
      const logoMat = new THREE.MeshStandardMaterial({
        color: COL_LOGO,
        roughness: 0.38,
        metalness: 0.68,
        envMap,
        envMapIntensity: 0.48
      });

      /** Isla de cámaras + lentes (grupo Object3D del GLTF llamado «Camera») */
      const camBumpMat = new THREE.MeshStandardMaterial({
        color: COL_CAM_BUMP,
        roughness: 0.8,
        metalness: 0.18,
        envMap,
        envMapIntensity: 0.42
      });
      const lensGlassMat = new THREE.MeshStandardMaterial({
        color: COL_LENS_GLASS,
        roughness: 0.14,
        metalness: 0.28,
        envMap,
        envMapIntensity: 0.88
      });
      const flashMat = new THREE.MeshStandardMaterial({
        color: 0xfff6ec,
        emissive: 0xffebd0,
        emissiveIntensity: 0.45,
        roughness: 0.38,
        metalness: 0.06,
        envMap,
        envMapIntensity: 0.35
      });

      const byMeshName = {
        Screen: screen,
        'Screen Border': bezel,
        'Back Side': backMatte,
        'Metal Border': metalEdge
      };

      root.traverse((obj) => {
        if (!obj.isMesh) return;
        const n = obj.name;
        const parent = obj.parent;

        if (parent?.name === 'Light') {
          disposeMeshMaterials(obj);
          obj.material = flashMat;
          return;
        }

        if (['Cam1', 'Cam2', 'Cam2 2'].includes(parent?.name || '')) {
          disposeMeshMaterials(obj);
          obj.material = lensGlassMat;
          return;
        }

        if (parent?.name === 'Camera') {
          if (n === 'Cube' || n === 'Cube 2') {
            disposeMeshMaterials(obj);
            obj.material = camBumpMat;
            return;
          }
          if (n === 'Ellipse 3') {
            disposeMeshMaterials(obj);
            obj.material = lensGlassMat;
            return;
          }
        }

        if (byMeshName[n]) {
          disposeMeshMaterials(obj);
          obj.material = byMeshName[n];
          return;
        }

        if (n === 'Button' || obj.parent?.name === 'Left Buttons' || obj.parent?.name === 'Right Buttons') {
          disposeMeshMaterials(obj);
          obj.material = metalButton;
          return;
        }

        if (obj.parent?.name === 'Logo') {
          disposeMeshMaterials(obj);
          obj.material = logoMat;
        }
      });
    }

    function hideLandingChrome(root) {
      const floor = root.getObjectByName('Floor');
      if (floor) floor.visible = false;

      ['Text 3', 'Text 2', 'Text'].forEach((name) => {
        const o = root.getObjectByName(name);
        if (o) o.visible = false;
      });

      const sceneGroup = root.getObjectByName('Scene');
      if (sceneGroup) {
        sceneGroup.children.forEach((ch) => {
          if (ch.name === 'Ellipse') ch.visible = false;
        });
      }
    }

    function framePhone(root) {
      const phone = root.getObjectByName('iPhone 14 Pro');
      if (!phone) return;
      const box = new THREE.Box3().setFromObject(phone);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());

      /** Encajar todo el teléfono en el encuadre — margen extra para que no haga falta alejar el zoom */
      const margin = 1.26;
      const vFovRad = THREE.MathUtils.degToRad(camera.fov);
      const tanHalf = Math.tan(vFovRad / 2);
      const distV = (size.y * margin) / (2 * tanHalf);
      const distH = (size.x * margin) / (2 * tanHalf * camera.aspect);
      const dist = Math.max(distV, distH);

      controls.target.copy(center);
      camera.position.set(center.x + dist * 0.52, center.y + dist * 0.2, center.z + dist * 0.68);
      camera.near = Math.max(dist / 800, 0.02);
      camera.far = dist * 80;
      camera.updateProjectionMatrix();

      const sphere = box.getBoundingSphere(new THREE.Sphere());
      controls.minDistance = Math.max(sphere.radius * 0.25, 0.15);
      controls.maxDistance = sphere.radius * 25;
      controls.update();
    }

    const hemi = new THREE.HemisphereLight(0xd8dde8, 0x3a3d44, 0.55);
    scene.add(hemi);

    const key = new THREE.DirectionalLight(0xffffff, 1.25);
    key.position.set(4.2, 6.5, 3.2);
    scene.add(key);

    const fill = new THREE.DirectionalLight(0xb8c0d0, 0.35);
    fill.position.set(-3.5, 2.2, -2.8);
    scene.add(fill);

    const loader = new GLTFLoader();
    loader.load(
      './3_d_smartphone_mockup_landing_page.gltf',
      (gltf) => {
        const root = gltf.scene;
        stripLights(root);
        hideLandingChrome(root);
        applyMockupMaterials(root, envTexture);
        scene.add(root);
        framePhone(root);
      },
      undefined,
      (err) => {
        console.error(err);
        document.getElementById('hint').textContent = 'No se pudo cargar el GLTF (¿servidor local?).';
      }
    );

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function tick() {
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    }
    tick();
  </script>
</body>
</html>
