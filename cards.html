<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Carrusel 3D — tarjetas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* Basado en Uiverse.io por ilkhoeri */
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100vh;
      background: #0c0c12;
    }

    .wrapper {
      width: 100%;
      min-height: 100vh;
      position: relative;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .inner {
      --w: 100px;
      --h: 150px;
      --translateZ: calc((var(--w) + var(--h)) + 0px);
      --rotateX: -15deg;
      --perspective: 1000px;
      position: absolute;
      width: var(--w);
      height: var(--h);
      top: 25%;
      left: calc(50% - (var(--w) / 2) - 2.5px);
      z-index: 2;
      transform-style: preserve-3d;
      transform: perspective(var(--perspective));
      animation: rotating 20s linear infinite;
    }

    @keyframes rotating {
      from {
        transform: perspective(var(--perspective)) rotateX(var(--rotateX)) rotateY(0);
      }
      to {
        transform: perspective(var(--perspective)) rotateX(var(--rotateX)) rotateY(1turn);
      }
    }

    .card {
      position: absolute;
      border: 2px solid rgba(var(--color-card), 1);
      border-radius: 12px;
      overflow: hidden;
      inset: 0;
      /* Solo hemisferio frontal: oculta la cara trasera de cada tarjeta en el cilindro */
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transform: rotateY(calc((360deg / var(--quantity)) * var(--index)))
        translateZ(var(--translateZ));
    }

    .img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #0000
        radial-gradient(
          circle,
          rgba(var(--color-card), 0.2) 0%,
          rgba(var(--color-card), 0.6) 80%,
          rgba(var(--color-card), 0.9) 100%
        );
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="inner" style="--quantity: 10;">
      <div class="card" style="--index: 0; --color-card: 142, 249, 252;">
        <div class="img"></div>
      </div>
      <div class="card" style="--index: 1; --color-card: 142, 252, 204;">
        <div class="img"></div>
      </div>
      <div class="card" style="--index: 2; --color-card: 142, 252, 157;">
        <div class="img"></div>
      </div>
      <div class="card" style="--index: 3; --color-card: 215, 252, 142;">
        <div class="img"></div>
      </div>
      <div class="card" style="--index: 4; --color-card: 252, 252, 142;">
        <div class="img"></div>
      </div>
      <div class="card" style="--index: 5; --color-card: 252, 208, 142;">
        <div class="img"></div>
      </div>
      <div class="card" style="--index: 6; --color-card: 252, 142, 142;">
        <div class="img"></div>
      </div>
      <div class="card" style="--index: 7; --color-card: 252, 142, 239;">
        <div class="img"></div>
      </div>
      <div class="card" style="--index: 8; --color-card: 204, 142, 252;">
        <div class="img"></div>
      </div>
      <div class="card" style="--index: 9; --color-card: 142, 202, 252;">
        <div class="img"></div>
      </div>
    </div>
  </div>
</body>
</html>
