<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Studio Display — 3D</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #ffffff; }
    #c { display: block; width: 100%; height: 100%; touch-action: none; }
    #c.manual { cursor: grab; }
    #hint {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      font: 12px system-ui, sans-serif;
      color: rgba(255, 255, 255, 0.35);
      pointer-events: none;
      text-align: center;
      max-width: 90vw;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hint"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    const MANUAL = /manual=1/i.test(location.search);

    const SCREEN_NORMAL_FLIP = 1;
    const FRONT_DELTA_FALLBACK = -0.67;
    const FRONT_HEIGHT_OFFSET = 0;

    const isMobile = window.innerWidth < 768;

    const FRONT_VIEW = {
      targetX: 0,
      targetY: 0,
      zoom:    isMobile ? 1.25 : 0.65,
    };

    const DISPLAY_SCALE = 1;
    const GROUND_SCALE  = 1;
    const WALL_SCALE    = 2;

    const canvas = document.getElementById('c');
    if (MANUAL) canvas.classList.add('manual');
    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.01,
      500000
    );

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.95;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a2f3a);

    const pmrem = new THREE.PMREMGenerator(renderer);
    const envScene = new RoomEnvironment();
    scene.environment = pmrem.fromScene(envScene, 0.04).texture;
    pmrem.dispose();
    envScene.dispose();

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.enabled = MANUAL;

    const clock = new THREE.Clock();
    let mixer = null;

    function materialsFromMock(root) {
      const alu = {
        color: 0xd4d4d8,
        metalness: 0.92,
        roughness: 0.28,
        envMapIntensity: 1.0
      };
      const byName = {
        Frame: {
          color: 0x0c0c0e,
          metalness: 0.05,
          roughness: 0.88,
          envMapIntensity: 0.15
        },
        Monitor: alu,
        Stand: alu,
        'MOCKUP (change image)': {
          color: 0x050508,
          metalness: 0.0,
          roughness: 0.05,
          envMapIntensity: 1.2
        },
        Backgroud: {
          color: 0x1a2f3a,
          metalness: 0,
          roughness: 0.95,
          envMapIntensity: 0.08
        },
        Ground: {
          color: 0x2a2420,
          metalness: 0,
          roughness: 0.65,
          envMapIntensity: 0.30
        }
      };

      root.traverse((o) => {
        if (!o.isMesh) return;
        const spec = byName[o.name];
        if (!spec) return;
        const prev = o.material;
        const list = Array.isArray(prev) ? prev : [prev];
        const mats = list.map(
          () =>
            new THREE.MeshStandardMaterial({
              color: spec.color,
              metalness: spec.metalness,
              roughness: spec.roughness,
              envMapIntensity: spec.envMapIntensity
            })
        );
        list.forEach((m) => m.dispose?.());
        o.material = mats.length === 1 ? mats[0] : mats;
      });
    }

    function removeGltfLights(root) {
      const lights = [];
      root.traverse((o) => {
        if (o.isLight) lights.push(o);
      });
      lights.forEach((L) => L.parent?.remove(L));
    }

    function shadowsOn(root) {
      root.traverse((o) => {
        if (o.isMesh) {
          o.castShadow = true;
          o.receiveShadow = true;
        }
      });
    }

    function addKeyLight(center, size) {
      scene.add(new THREE.AmbientLight(0x8899aa, 0.2));
      scene.add(new THREE.HemisphereLight(0x5c6670, 0x18181c, 0.32));

      const sun = new THREE.DirectionalLight(0xffffff, 2.25);
      sun.position.set(center.x - size.x, center.y + size.y * 2.1, center.z + size.z * 0.9);
      sun.target.position.copy(center);
      scene.add(sun);
      scene.add(sun.target);

      sun.castShadow = true;
      sun.shadow.mapSize.set(2048, 2048);
      sun.shadow.camera.near = 1;
      sun.shadow.camera.far = Math.max(size.length(), 1) * 30;
      sun.shadow.bias = -0.00022;
      sun.shadow.normalBias = 0.032;
      const e = Math.max(size.x, size.y, size.z) * 1.75;
      sun.shadow.camera.left = -e;
      sun.shadow.camera.right = e;
      sun.shadow.camera.top = e;
      sun.shadow.camera.bottom = -e;
    }

    const targetFront = new THREE.Vector3();
    const screenCenter = new THREE.Vector3();

    new GLTFLoader().load(
      './studio_display_mockup.gltf',
      (gltf) => {
        scene.add(gltf.scene);
        gltf.scene.updateMatrixWorld(true);

        removeGltfLights(gltf.scene);
        materialsFromMock(gltf.scene);

        const display = gltf.scene.getObjectByName('Display');
        const mockup  = gltf.scene.getObjectByName('MOCKUP (change image)');
        if (display && mockup) display.attach(mockup);
        if (display) display.scale.multiplyScalar(DISPLAY_SCALE);

        gltf.scene.updateMatrixWorld(true);

        const box = new THREE.Box3().setFromObject(display || gltf.scene);
        const baseCenter = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());

        addKeyLight(baseCenter, size);

        const ground = gltf.scene.getObjectByName('Ground');
        if (ground) ground.scale.multiplyScalar(GROUND_SCALE);
        const wall = gltf.scene.getObjectByName('Backgroud');
        if (wall) wall.scale.multiplyScalar(WALL_SCALE);
        gltf.scene.updateMatrixWorld(true);

        shadowsOn(gltf.scene);

        if (gltf.cameras?.length && gltf.cameras[0].isPerspectiveCamera) {
          const c = gltf.cameras[0];
          c.aspect = window.innerWidth / window.innerHeight;
          c.updateProjectionMatrix();
          camera.copy(c);
        } else {
          const md = Math.max(size.x, size.y, size.z, 1e-6);
          const d = md * 2;
          camera.position.copy(baseCenter).add(new THREE.Vector3(d * 0.5, d * 0.38, d * 0.62));
        }

        const boundSph = box.getBoundingSphere(new THREE.Sphere());
        camera.near = Math.max(0.001, boundSph.radius / 2000);
        camera.far = Math.max(boundSph.radius * 50, 1000);
        camera.updateProjectionMatrix();

        const originalRadius = camera.position.distanceTo(baseCenter);
        const frontDist = originalRadius * FRONT_VIEW.zoom;

        if (mockup) {
          mockup.updateMatrixWorld(true);
          new THREE.Box3().setFromObject(mockup).getCenter(screenCenter);
          targetFront.copy(screenCenter);
          targetFront.x += FRONT_VIEW.targetX;
          targetFront.y += FRONT_VIEW.targetY;
          const outward = new THREE.Vector3(0, 0, 1);
          outward.transformDirection(mockup.matrixWorld);
          outward.multiplyScalar(SCREEN_NORMAL_FLIP).normalize();
          outward.y = 0;
          outward.normalize();
          camera.position.copy(targetFront).addScaledVector(outward, frontDist);
          camera.position.y = targetFront.y + size.y * FRONT_HEIGHT_OFFSET;
        } else {
          targetFront.copy(baseCenter);
          targetFront.x += FRONT_VIEW.targetX;
          targetFront.y += FRONT_VIEW.targetY;
          const sph = new THREE.Spherical().setFromVector3(
            new THREE.Vector3().subVectors(camera.position, baseCenter)
          );
          const frontSph = new THREE.Spherical(
            frontDist,
            Math.PI / 2,
            sph.theta + FRONT_DELTA_FALLBACK
          );
          camera.position.setFromSpherical(frontSph).add(targetFront);
          camera.position.y = targetFront.y + size.y * FRONT_HEIGHT_OFFSET;
        }

        camera.lookAt(targetFront);
        controls.target.copy(targetFront);

        if (gltf.animations?.length) {
          mixer = new THREE.AnimationMixer(gltf.scene);
          gltf.animations.forEach((clip) => mixer.clipAction(clip).play());
        }

        controls.update();
      },
      undefined,
      (e) => {
        console.error(e);
        document.getElementById('hint').textContent =
          'Error al cargar studio_display_mockup.gltf · usa servidor local (npx serve)';
      }
    );

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function tick() {
      requestAnimationFrame(tick);
      const dt = clock.getDelta();
      if (mixer) mixer.update(dt);
      if (MANUAL) controls.update();
      renderer.render(scene, camera);
    }
    tick();
  </script>
</body>
</html>
